# Regression net for every push and pull request: the full backend test
# suite (with a coverage floor) and a frontend type-check + production
# build. Complements security-scan.yml, which handles dependency auditing
# on its own schedule -- this workflow answers "does the code still work",
# that one answers "are the dependencies still safe".
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      # The floor (88%) sits deliberately below the current 94% so a
      # legitimately hard-to-test addition doesn't block a push, while a
      # real collapse in coverage still fails loudly. Ratchet it up as
      # coverage grows; never ratchet it down to make a failure pass.
      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=88

  frontend-build:
    name: Frontend type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # "npm run build" is tsc -b && vite build, so this is both the
      # type-check (the frontend's only automated correctness signal until
      # the v0.1.x test versions) and proof the production bundle builds.
      - name: Type-check and build
        run: npm run build
